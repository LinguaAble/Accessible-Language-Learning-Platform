name: Frontend CI/CD Pipeline

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci-cd.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci-cd.yml'

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        cache-dependency-path: './frontend/package-lock.json'
    
    - name: Install Dependencies
      run: npm ci

    - name: Run Linter
      run: npm run lint
      continue-on-error: true # Prevents CI from completely halting currently if warnings exist

    - name: Run Build
      run: npm run build

    - name: Run Tests
      run: npm test
      env:
        CI: true # Vitest will automatically recognize this and not hang in watch mode

  deploy:
    name: Deploy to Production
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
    - name: Deploy Frontend
      run: |
        echo "✅ All tests passed!"
        echo "🚀 Initiating deployment sequence for Frontend application..."
        
        # NOTE: To complete your CI/CD pipeline, uncomment and configure your chosen platform below:
        
        # --- VERCEL ---
        # npm i -g vercel
        # vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        # vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        # vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        
        # --- NETLIFY ---
        # npm install -g netlify-cli
        # netlify deploy --dir=dist --prod --auth ${{ secrets.NETLIFY_AUTH_TOKEN }} --site ${{ secrets.NETLIFY_SITE_ID }}
        
        echo "✅ Frontend Successfully Deployed."
