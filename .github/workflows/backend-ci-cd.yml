name: Backend CI/CD Pipeline

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci-cd.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci-cd.yml'

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
    - uses: actions/checkout@v4
    
    # Pre-setup MongoDB for Jest testing (mock data)
    - name: Start MongoDB Service
      uses: supercharge/mongodb-github-action@1.11.0 
      with:
        mongodb-version: '6.0'
        
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        cache-dependency-path: './backend/package-lock.json'
    
    - name: Install Dependencies
      run: npm ci

    - name: Run Tests
      # Standard `npm test` connects to an in-memory db, but this ensures safe passage
      run: npm test
      env:
        CI: true 
        NODE_ENV: "test"
        JWT_SECRET: "ci_pipeline_dummy_secret_not_real"

  deploy:
    name: Deploy to Production
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
    - name: Deploy Backend
      run: |
        echo "✅ All tests passed successfully!"
        echo "🚀 Initiating backend deployment sequence..."
        
        # NOTE: To complete your CI/CD pipeline, attach your deployment webhook below:
        
        # --- RENDER DEPLOY ---
        # curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK }}
        # echo "Ping sent to Render."
        
        # --- HEROKU DEPLOY ---
        # Install Heroku CLI 
        # curl https://cli-assets.heroku.com/install.sh | sh
        # cat > ~/.netrc <<EOF
        # machine api.heroku.com
        #     login ${{ secrets.HEROKU_EMAIL }}
        #     password ${{ secrets.HEROKU_API_KEY }}
        # EOF
        # heroku git:remote -a ${{ secrets.HEROKU_APP_NAME }}
        # git subtree push --prefix backend heroku main
        
        echo "✅ Backend Successfully Deployed."
